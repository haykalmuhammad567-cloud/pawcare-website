        <a href="index.html">Beranda</a>
        <a href="layanan.html">Layanan</a>
        <a href="galeri.html">Galeri</a>
        <a href="kontak.html">Kontak</a>
    </nav>
</header>

<section class="contact-section">

    <div class="contact-box">

        <h2>Hubungi Kami 🐾</h2>

        <p>
            Punya pertanyaan, ingin melakukan reservasi,
            atau membutuhkan informasi lebih lanjut?
            Silakan hubungi kami melalui formulir berikut.
        </p>

        <form>

            <input
                type="text"
                placeholder="Nama Lengkap"
                required
            >

            <input
                type="email"
                placeholder="Email"
                required
            >

            <input
                type="tel"
                placeholder="Nomor Telepon"
                required
            >

            <textarea
                rows="5"
                placeholder="Tulis pesan Anda..."
                required
            ></textarea>

            <button type="submit">
                Kirim Pesan
            </button>

        </form>

    </div>

</section>

<footer>
    <p>© 2026 PawCare Pet Service</p>
</footer>

</body>
</html>
